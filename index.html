<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบรับคืนสินค้า</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; max-width: 600px; margin: auto; }
        h2 { text-align: center; color: #333; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        video { width: 100%; border-radius: 8px; background: #000; display: none; margin-top: 10px; }
        canvas { display: none; }
        img { width: 100%; border-radius: 8px; margin-top: 10px; display: none; border: 1px solid #ddd; }
        label { font-weight: bold; margin-top: 10px; display: block; color: #555; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button, .btn-upload-label { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; color: white; display: inline-block; text-align: center; box-sizing: border-box; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-camera { background-color: #007bff; flex: 1; margin-top: 0; }
        .btn-upload-label { background-color: #6c757d; flex: 1; margin-top: 0; }
        .btn-capture { background-color: #28a745; display: none; margin-top: 10px; }
        .btn-submit { background-color: #ff9800; font-weight: bold; margin-top: 20px; }
        .status { text-align: center; margin-top: 10px; font-weight: bold; color: #d32f2f; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <h2>📦 ระบบรับสินค้าคืน/ตีกลับ</h2>

    <!-- ส่วนที่ 1: ถ่ายรูป/อัปโหลด หน้ากล่อง -->
    <div class="card">
        <h3>1. รูปใบปะหน้ากล่อง</h3>
        <div class="btn-group">
            <button class="btn-camera" id="startBoxCam">📷 เปิดกล้อง</button>
            <label class="btn-upload-label">
                📂 เลือกรูป
                <input type="file" id="uploadBoxBtn" accept="image/*">
            </label>
        </div>
        <video id="boxVideo" autoplay playsinline></video>
        <button class="btn-capture" id="captureBoxBtn">📸 ถ่ายรูปและดึงข้อมูลด้วย AI</button>
        <img id="boxPreview" alt="Box Preview">
        <p class="status" id="boxStatus"></p>

        <label>แพลตฟอร์ม:</label>
        <select id="platform">
            <option value="">-- เลือกแพลตฟอร์ม --</option>
            <option value="Shopee">Shopee</option>
            <option value="Lazada">Lazada</option>
            <option value="TikTok">TikTok</option>
        </select>

        <label>เลขพัสดุรับคืน (Tracking):</label>
        <input type="text" id="tracking" placeholder="AI จะเติมให้อัตโนมัติ">

        <label>หมายเลขคำสั่งซื้อ (Order ID):</label>
        <input type="text" id="orderId" placeholder="AI จะเติมให้อัตโนมัติ">
    </div>

    <!-- ส่วนที่ 2: ถ่ายรูป/อัปโหลด สินค้า -->
    <div class="card">
        <h3>2. รูปสินค้าด้านใน</h3>
        <div class="btn-group">
            <button class="btn-camera" id="startProductCam">📷 เปิดกล้อง</button>
            <label class="btn-upload-label">
                📂 เลือกรูป
                <input type="file" id="uploadProductBtn" accept="image/*">
            </label>
        </div>
        <video id="productVideo" autoplay playsinline></video>
        <button class="btn-capture" id="captureProductBtn">📸 ถ่ายรูปและประเมินด้วย AI</button>
        <img id="productPreview" alt="Product Preview">
        <p class="status" id="productStatus"></p>

        <label>ผลประเมินสภาพจาก AI:</label>
        <textarea id="aiCondition" rows="2" readonly placeholder="AI จะช่วยประเมินสภาพเบื้องต้น"></textarea>

        <label>สถานะสินค้าขั้นสุดท้าย (คุณยืนยัน):</label>
        <select id="finalCondition">
            <option value="สมบูรณ์ พร้อมขายต่อ">สมบูรณ์ พร้อมขายต่อ</option>
            <option value="มีตำหนิ/แพ็กเกจพัง">มีตำหนิ/แพ็กเกจพัง</option>
            <option value="สินค้าไม่ตรง/สูญหาย">สินค้าไม่ตรง/สูญหาย</option>
        </select>

        <label>หมายเหตุเพิ่มเติม:</label>
        <textarea id="notes" rows="2" placeholder="ระบุรายละเอียดเพิ่มเติม (ถ้ามี)"></textarea>
    </div>

    <button class="btn-submit" id="submitBtn">💾 บันทึกข้อมูลลงระบบ</button>
    <p class="status" id="submitStatus"></p>
    <canvas id="canvas"></canvas>

    <script>
        // --- นำ WEB APP URL มาใส่ตรงนี้ ---
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzyQ5g06mroszP1rA4bXi0IGqYEW6wcdyzzMplfZ5eWQZys-MlSW71l_OsLNJxxW9n8/exec";
        
        let boxImageBase64 = "";
        let productImageBase64 = "";
        let currentStream = null;

        // --- ฟังก์ชันกล้อง ---
        async function startCamera(videoElementId, captureBtnId, previewId) {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } } });
                document.getElementById(videoElementId).srcObject = stream;
                document.getElementById(videoElementId).style.display = 'block';
                document.getElementById(captureBtnId).style.display = 'block';
                document.getElementById(previewId).style.display = 'none';
                currentStream = stream;
            } catch (err) {
                alert("ไม่สามารถเปิดกล้องได้: " + err);
            }
        }

        function captureImage(videoElementId, previewElementId) {
            const video = document.getElementById(videoElementId);
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64Full = canvas.toDataURL('image/jpeg', 0.8);
            document.getElementById(previewElementId).src = base64Full;
            document.getElementById(previewElementId).style.display = 'block';
            video.style.display = 'none';
            if (currentStream) currentStream.getTracks().forEach(track => track.stop());
            return base64Full.split(',')[1];
        }

        function handleFileUpload(event, previewElementId, type) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function(e) {
                const base64Full = e.target.result;
                document.getElementById(previewElementId).src = base64Full;
                document.getElementById(previewElementId).style.display = 'block';
                if (currentStream) currentStream.getTracks().forEach(track => track.stop());
                const base64Data = base64Full.split(',')[1];
                
                if (type === 'box') {
                    boxImageBase64 = base64Data;
                    document.getElementById('boxVideo').style.display = 'none';
                    document.getElementById('captureBoxBtn').style.display = 'none';
                    document.getElementById('boxStatus').innerText = "⏳ ระบบหลังบ้านกำลังอ่านข้อมูล...";
                    document.getElementById('boxStatus').style.color = "#d32f2f";
                    await analyzeLabel(boxImageBase64);
                } else if (type === 'product') {
                    productImageBase64 = base64Data;
                    document.getElementById('productVideo').style.display = 'none';
                    document.getElementById('captureProductBtn').style.display = 'none';
                    document.getElementById('productStatus').innerText = "⏳ ระบบหลังบ้านกำลังประเมิน...";
                    document.getElementById('productStatus').style.color = "#d32f2f";
                    await analyzeCondition(productImageBase64);
                }
            };
            reader.readAsDataURL(file);
        }

        // --- ตั้งค่าปุ่มกดต่างๆ ---
        document.getElementById('startBoxCam').addEventListener('click', () => startCamera('boxVideo', 'captureBoxBtn', 'boxPreview'));
        document.getElementById('captureBoxBtn').addEventListener('click', async () => {
            boxImageBase64 = captureImage('boxVideo', 'boxPreview');
            document.getElementById('captureBoxBtn').style.display = 'none';
            document.getElementById('boxStatus').innerText = "⏳ ระบบหลังบ้านกำลังอ่านข้อมูล...";
            document.getElementById('boxStatus').style.color = "#d32f2f";
            await analyzeLabel(boxImageBase64);
        });
        document.getElementById('uploadBoxBtn').addEventListener('change', (e) => handleFileUpload(e, 'boxPreview', 'box'));

        document.getElementById('startProductCam').addEventListener('click', () => startCamera('productVideo', 'captureProductBtn', 'productPreview'));
        document.getElementById('captureProductBtn').addEventListener('click', async () => {
            productImageBase64 = captureImage('productVideo', 'productPreview');
            document.getElementById('captureProductBtn').style.display = 'none';
            document.getElementById('productStatus').innerText = "⏳ ระบบหลังบ้านกำลังประเมิน...";
            document.getElementById('productStatus').style.color = "#d32f2f";
            await analyzeCondition(productImageBase64);
        });
        document.getElementById('uploadProductBtn').addEventListener('change', (e) => handleFileUpload(e, 'productPreview', 'product'));

        // --- ส่งข้อมูลไปวิเคราะห์ที่ Google Apps Script ---
        async function callAppsScript(payload) {
            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (data.status === "error") throw new Error(data.message);
                return data;
            } catch (error) {
                throw new Error("ติดต่อฐานข้อมูลไม่ได้ (" + error.message + ")");
            }
        }

        async function analyzeLabel(base64Image) {
            try {
                const prompt = "Extract data from this Thai shipping label. Return ONLY JSON format: {\"tracking\":\"...\", \"orderId\":\"...\", \"platform\":\"...\"}. Do not write any other text.";
                const dataResponse = await callAppsScript({ action: "analyze", imageBase64: base64Image, prompt: prompt });
                
                let resultText = dataResponse.text;
                const startIndex = resultText.indexOf('{');
                const endIndex = resultText.lastIndexOf('}') + 1;
                if (startIndex === -1 || endIndex === 0) throw new Error("ข้อมูลผิดรูปแบบ: " + resultText);
                
                const data = JSON.parse(resultText.substring(startIndex, endIndex));
                
                if(data.tracking) document.getElementById('tracking').value = data.tracking;
                if(data.orderId) document.getElementById('orderId').value = data.orderId;
                if(data.platform) {
                    const select = document.getElementById('platform');
                    for (let i = 0; i < select.options.length; i++) {
                        if (select.options[i].value.toLowerCase().includes(data.platform.toLowerCase())) {
                            select.selectedIndex = i;
                            break;
                        }
                    }
                }
                document.getElementById('boxStatus').innerText = "✅ ดึงข้อมูลสำเร็จ!";
                document.getElementById('boxStatus').style.color = "green";
            } catch (error) {
                document.getElementById('boxStatus').innerText = "❌ อ่านไม่สำเร็จ (" + error.message + ")";
                document.getElementById('boxStatus').style.color = "#d32f2f";
            }
        }

        async function analyzeCondition(base64Image) {
            try {
                const prompt = "Analyze this product image. Briefly describe physical condition in Thai (e.g., กล่องบุบ, สมบูรณ์). Keep under 2 sentences.";
                const dataResponse = await callAppsScript({ action: "analyze", imageBase64: base64Image, prompt: prompt });
                document.getElementById('aiCondition').value = dataResponse.text.trim();
                document.getElementById('productStatus').innerText = "✅ ประเมินสำเร็จ!";
                document.getElementById('productStatus').style.color = "green";
            } catch (error) {
                document.getElementById('productStatus').innerText = "❌ ประเมินไม่ได้ (" + error.message + ")";
                document.getElementById('productStatus').style.color = "#d32f2f";
            }
        }

        // --- บันทึกข้อมูลลง Sheet ---
        document.getElementById('submitBtn').addEventListener('click', async () => {
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('submitStatus');
            
            if(!boxImageBase64 || !productImageBase64) {
                alert("กรุณาใส่รูปทั้งหน้ากล่องและสินค้าด้านในให้ครบ");
                return;
            }

            btn.disabled = true;
            btn.innerText = "กำลังบันทึกข้อมูล...";
            status.innerText = "";

            const payload = {
                action: "submit",
                platform: document.getElementById('platform').value,
                tracking: document.getElementById('tracking').value,
                orderId: document.getElementById('orderId').value,
                aiCondition: document.getElementById('aiCondition').value,
                finalCondition: document.getElementById('finalCondition').value,
                notes: document.getElementById('notes').value,
                boxImageBase64: boxImageBase64,
                productImageBase64: productImageBase64
            };

            try {
                const result = await callAppsScript(payload);
                status.style.color = "green";
                status.innerText = "🎉 บันทึกข้อมูลลงระบบเรียบร้อย!";
                setTimeout(() => location.reload(), 2000);
            } catch (error) {
                status.innerText = "❌ เกิดข้อผิดพลาด: " + error.message;
                btn.disabled = false;
                btn.innerText = "💾 บันทึกข้อมูลลงระบบ";
            }
        });
    </script>
</body>
</html>
