<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบรับสินค้าคืน/ตีกลับ</title>
    <!-- โหลดสไตล์ CSS (Bootstrap) และ Icon -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Sarabun', sans-serif; }
        .card { transition: all 0.2s ease; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important; }
        .loading { display: none; }
    </style>
</head>
<body>
    <div class="container py-4" style="max-width: 600px;">
        <h3 class="text-center mb-3 fw-bold text-primary"><i class="bi bi-box-seam"></i> ระบบรับสินค้าตีกลับ</h3>

        <!-- ปุ่มเปิดประวัติการบันทึก -->
        <div class="text-end mb-3">
            <button class="btn btn-outline-primary btn-sm fw-bold shadow-sm" onclick="fetchRecords()" data-bs-toggle="modal" data-bs-target="#recordsModal">
                <i class="bi bi-clock-history"></i> ประวัติล่าสุด (10 รายการ)
            </button>
        </div>

        <!-- 1. รูปใบปะหน้ากล่อง -->
        <div class="card mb-4 shadow-sm border-0 rounded-4">
            <div class="card-body p-4">
                <h5 class="card-title fw-bold mb-3 text-secondary">1. รูปใบปะหน้ากล่อง</h5>
                
                <div class="d-grid mb-3">
                    <button type="button" class="btn btn-primary py-2 fw-bold" onclick="document.getElementById('boxInput').click()">
                        <i class="bi bi-camera"></i> เปิดกล้อง / เลือกรูป
                    </button>
                    <!-- ปุ่มซ่อนสำหรับเลือกไฟล์ -->
                    <input type="file" id="boxInput" accept="image/*" class="d-none" onchange="handleImageUpload(event, 'box')">
                </div>
                
                <!-- พรีวิวรูปกล่อง -->
                <div id="boxPreviewContainer" class="d-none text-center mb-3">
                    <img id="boxPreview" class="img-fluid rounded border shadow-sm" style="max-height: 250px;">
                </div>
                
                <!-- สถานะการอ่าน OCR -->
                <div id="analyzeLoading" class="loading text-center text-primary mb-3 fw-bold">
                    <div class="spinner-border spinner-border-sm" role="status"></div> กำลังอ่านข้อความผ่าน Google Drive...
                </div>
                <div id="analyzeError" class="text-danger small mb-3 text-center fw-bold"></div>

                <!-- ฟอร์มข้อมูลจากหน้ากล่อง -->
                <div class="mb-3">
                    <label class="form-label fw-bold">แพลตฟอร์ม:</label>
                    <select id="platform" class="form-select bg-light">
                        <option value="">-- เลือกแพลตฟอร์ม --</option>
                        <option value="Shopee">Shopee</option>
                        <option value="Lazada">Lazada</option>
                        <option value="TikTok">TikTok</option>
                        <option value="อื่นๆ">อื่นๆ</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">เลขพัสดุรับคืน (Tracking):</label>
                    <input type="text" id="tracking" class="form-control" placeholder="ระบบจะเติมให้อัตโนมัติ">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">หมายเลขคำสั่งซื้อ (Order ID):</label>
                    <input type="text" id="orderId" class="form-control" placeholder="ระบบจะเติมให้อัตโนมัติ">
                </div>
            </div>
        </div>

        <!-- 2. วิดีโอตอนเปิดเช็คของ -->
        <div class="card mb-4 shadow-sm border-0 rounded-4">
            <div class="card-body p-4">
                <h5 class="card-title fw-bold mb-3 text-secondary">2. วิดีโอตอนเปิดเช็คของ (ถ้ามี)</h5>
                
                <div class="d-grid mb-3">
                    <button type="button" class="btn btn-danger py-2 fw-bold" onclick="document.getElementById('videoInput').click()">
                        <i class="bi bi-camera-video"></i> ถ่าย / อัปโหลดวิดีโอ
                    </button>
                    <!-- ปุ่มซ่อนสำหรับวิดีโอ (capture="environment" เพื่อเรียกกล้องหลังมือถือ) -->
                    <input type="file" id="videoInput" accept="video/*" capture="environment" class="d-none" onchange="handleVideoUpload(event)">
                </div>
                
                <!-- พรีวิววิดีโอ -->
                <div id="videoPreviewContainer" class="d-none text-center mt-3">
                    <video id="videoPreview" width="100%" controls class="rounded border shadow-sm"></video>
                    <p id="videoFileName" class="mt-2 text-muted small"></p>
                </div>
            </div>
        </div>

        <!-- 3. รูปสินค้าด้านใน -->
        <div class="card mb-4 shadow-sm border-0 rounded-4">
            <div class="card-body p-4">
                <h5 class="card-title fw-bold mb-3 text-secondary">3. รูปสินค้าด้านใน</h5>
                
                <div class="d-grid mb-3">
                    <button type="button" class="btn btn-secondary py-2 fw-bold" onclick="document.getElementById('productInput').click()">
                        <i class="bi bi-box-open"></i> เปิดกล้อง / เลือกรูป
                    </button>
                    <input type="file" id="productInput" accept="image/*" class="d-none" onchange="handleImageUpload(event, 'product')">
                </div>
                
                <div id="productPreviewContainer" class="d-none text-center mb-3">
                    <img id="productPreview" class="img-fluid rounded border shadow-sm" style="max-height: 250px;">
                </div>

                <!-- ฟอร์มข้อมูลสินค้า -->
                <div class="mb-3">
                    <label class="form-label fw-bold">ผลประเมินสภาพ (ถ้ามี):</label>
                    <input type="text" id="aiCondition" class="form-control bg-light" placeholder="-">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">สถานะสินค้าขั้นสุดท้าย:</label>
                    <select id="finalCondition" class="form-select border-primary fw-bold text-primary">
                        <option value="สมบูรณ์ พร้อมขายต่อ">สมบูรณ์ พร้อมขายต่อ</option>
                        <option value="กล่องบุบ/เสียหาย แต่สินค้าปกติ">กล่องบุบ/เสียหาย แต่สินค้าปกติ</option>
                        <option value="สินค้าชำรุด/เสียหาย">สินค้าชำรุด/เสียหาย</option>
                        <option value="สินค้าไม่ครบ/สูญหาย">สินค้าไม่ครบ/สูญหาย</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">หมายเหตุ (ถ้ามี):</label>
                    <textarea id="notes" class="form-control" rows="2" placeholder="เช่น ลูกค้าแกะซีลแล้ว, ของแถมหาย..."></textarea>
                </div>
            </div>
        </div>

        <!-- ปุ่มบันทึกข้อมูล -->
        <button id="submitBtn" class="btn btn-success w-100 py-3 mb-5 fw-bold fs-5 shadow" onclick="submitData()">
            <i class="bi bi-cloud-arrow-up-fill"></i> บันทึกข้อมูลลงระบบ
        </button>
    </div>

    <!-- ---------------------------------------------------- -->
    <!-- Modal (ป๊อปอัป) สำหรับแสดงประวัติการบันทึก -->
    <!-- ---------------------------------------------------- -->
    <div class="modal fade" id="recordsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title fw-bold"><i class="bi bi-card-list"></i> 10 รายการล่าสุด</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="recordsBody">
                    <div class="text-center text-muted my-4">
                        <div class="spinner-border text-primary mb-2" role="status"></div><br>กำลังโหลดข้อมูล...
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ปิด</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Javascript ของ Bootstrap (จำเป็นสำหรับการทำ Modal ป๊อปอัป) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Javascript หลักของระบบ -->
    <script>
        // ⚠️ นำลิงก์ Web App (New Deployment) ของ Google Apps Script มาใส่ในเครื่องหมายคำพูดด้านล่างนี้ ⚠️
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyMY6DZH8DhBf2rLBcTnb15amHL0kHhj8oAdY9Mvo5sTUYoXQaGhoEV2-8LqTDd53ii/exec";

        // ตัวแปรเก็บข้อมูลไฟล์
        let boxImageBase64 = "";
        let productImageBase64 = "";
        let videoBase64Data = "";
        let videoMimeType = "";

        // ฟังก์ชันโหลดข้อมูลประวัติมาแสดง
        async function fetchRecords() {
            const recordsBody = document.getElementById('recordsBody');
            recordsBody.innerHTML = '<div class="text-center text-muted my-4"><div class="spinner-border text-primary mb-2" role="status"></div><br>กำลังดึงข้อมูล...</div>';
            
            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "getRecords" })
                });
                const result = await response.json();
                
                if (result.status === "success") {
                    if(result.data.length === 0) {
                        recordsBody.innerHTML = '<div class="text-center text-muted my-4">ยังไม่มีข้อมูลในระบบ</div>';
                        return;
                    }
                    
                    let html = '<div class="list-group">';
                    result.data.forEach(item => {
                        // เปลี่ยนสีป้ายแจ้งเตือนตามสภาพสินค้า
                        let badgeColor = item.finalCondition.includes("สมบูรณ์") ? "bg-success" : "bg-danger";
                        
                        html += `
                        <div class="list-group-item list-group-item-action py-3">
                            <div class="d-flex w-100 justify-content-between mb-1">
                                <h6 class="mb-1 fw-bold text-dark"><i class="bi bi-box"></i> ${item.tracking}</h6>
                                <small class="text-muted" style="font-size: 0.75rem;">${item.date}</small>
                            </div>
                            <p class="mb-1 small text-secondary">แพลตฟอร์ม: <b>${item.platform}</b></p>
                            <span class="badge ${badgeColor}">${item.finalCondition}</span>
                        </div>`;
                    });
                    html += '</div>';
                    recordsBody.innerHTML = html;
                } else {
                    recordsBody.innerHTML = `<div class="text-center text-danger my-4">❌ โหลดไม่ได้: ${result.message}</div>`;
                }
            } catch (error) {
                recordsBody.innerHTML = `<div class="text-center text-danger my-4">❌ การเชื่อมต่อขัดข้อง: ${error.message}</div>`;
            }
        }

        // ฟังก์ชันจัดการอัปโหลดรูปภาพพร้อมย่อขนาด
        function handleImageUpload(event, type) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800; // ย่อขนาดความกว้าง
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    // แปลงกลับเป็น Base64
                    const base64 = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];
                    const previewUrl = canvas.toDataURL('image/jpeg', 0.6);

                    if (type === 'box') {
                        boxImageBase64 = base64;
                        document.getElementById('boxPreview').src = previewUrl;
                        document.getElementById('boxPreviewContainer').classList.remove('d-none');
                        // ส่งไปให้ Google Drive OCR อ่านข้อความ
                        analyzeBoxImage(base64);
                    } else {
                        productImageBase64 = base64;
                        document.getElementById('productPreview').src = previewUrl;
                        document.getElementById('productPreviewContainer').classList.remove('d-none');
                    }
                }
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // ฟังก์ชันจัดการอัปโหลดวิดีโอ
        function handleVideoUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (file.size > 40 * 1024 * 1024) {
                alert("⚠️ วิดีโอมีขนาดใหญ่เกินไป (มากกว่า 40MB) อาจทำให้การบันทึกช้าลงมาก แนะนำให้ถ่ายเป็นคลิปสั้นๆ แทนครับ");
            }
            
            const videoURL = URL.createObjectURL(file);
            const videoPreview = document.getElementById('videoPreview');
            videoPreview.src = videoURL;
            document.getElementById('videoPreviewContainer').classList.remove('d-none');
            document.getElementById('videoFileName').innerText = file.name + " (" + (file.size / (1024*1024)).toFixed(2) + " MB)";
            
            videoMimeType = file.type;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                videoBase64Data = e.target.result.split(',')[1];
            };
            reader.readAsDataURL(file);
        }

        // ฟังก์ชันส่งรูปให้ OCR วิเคราะห์
        async function analyzeBoxImage(base64Data) {
            document.getElementById('analyzeLoading').style.display = 'block';
            document.getElementById('analyzeError').innerText = "";
            
            const payload = {
                action: "analyze",
                prompt: "label",
                imageBase64: base64Data
            };

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                
                if (result.status === "success") {
                    try {
                        const data = JSON.parse(result.text);
                        document.getElementById('tracking').value = data.tracking || "";
                        document.getElementById('orderId').value = data.orderId || "";
                        if (data.platform) {
                            document.getElementById('platform').value = data.platform;
                        }
                    } catch (e) {
                        document.getElementById('analyzeError').innerText = "❌ ดึงข้อมูลสำเร็จ แต่รูปแบบไม่ถูกต้อง";
                    }
                } else {
                    document.getElementById('analyzeError').innerText = "❌ อ่านไม่สำเร็จ: " + result.message;
                }
            } catch (error) {
                document.getElementById('analyzeError').innerText = "❌ การเชื่อมต่อขัดข้อง กรุณาลองใหม่ หรือกรอกด้วยมือครับ";
            } finally {
                document.getElementById('analyzeLoading').style.display = 'none';
            }
        }

        // ฟังก์ชันส่งข้อมูลทั้งหมดไปบันทึกลง Sheet
        async function submitData() {
            const btn = document.getElementById('submitBtn');
            
            if (!boxImageBase64) {
                alert("กรุณาอัปโหลดรูป 'ใบปะหน้ากล่อง' เป็นอย่างน้อยครับ");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> กำลังอัปโหลดข้อมูล...';

            const payload = {
                action: "submit",
                platform: document.getElementById('platform').value,
                tracking: document.getElementById('tracking').value,
                orderId: document.getElementById('orderId').value,
                boxImageBase64: boxImageBase64,
                productImageBase64: productImageBase64,
                videoBase64Data: videoBase64Data, 
                videoMimeType: videoMimeType,
                aiCondition: document.getElementById('aiCondition').value,
                finalCondition: document.getElementById('finalCondition').value,
                notes: document.getElementById('notes').value
            };

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const result = await response.json();

                if (result.status === "success") {
                    alert("✅ บันทึกข้อมูลเรียบร้อยแล้ว!");
                    window.location.reload(); 
                } else {
                    alert("❌ เกิดข้อผิดพลาดจากเซิร์ฟเวอร์: " + result.message);
                    resetSubmitButton(btn);
                }
            } catch (error) {
                alert("❌ การเชื่อมต่อขัดข้อง: " + error.message);
                resetSubmitButton(btn);
            }
        }

        function resetSubmitButton(btn) {
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-cloud-arrow-up-fill"></i> บันทึกข้อมูลลงระบบ';
        }
    </script>
</body>
</html>
